<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Formulir</title>
</head>
<body>
    <h1>Formulir Pendaftaran Siswa</h1>
    <form action="/proses_daftar.js" method="post" enctype="multipart/form-data"></form>
        <fieldset>
            <legend>Data Pribadi</legend>
            <label for="nama">Nama Lengkap:</label><br>
            <input type="text" id="nama" name="nama" placeholder="Masukan Nama Lengkap" required><br><br>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="contoh@email.com" required><br><br>
            <label for="hp">Nomor HP:</label><br>
            <input type="tel" id="hp" name="hp" pattern="[0-9]{10,13}" placeholder="08xxxxxxxxxx"><br><br>
            <label for="tgl_lahir">Tanggal Lahir:</label><br>
            <input type="date" id="tgl_lahir" name="tgl_lahir"><br><br>
            <label>Jenis Kelamin:</label><br>
            <input type="radio" id="pria" name="gender" value="Pria">
            <label for="pria">Pria</label>
            <input type="radio" id="wanita" name="gender" value="Wanita">
            <label for="wanita">Wanita</label>
        </fieldset><br>
    
        <fieldset>
            <legend>Data Akademik</legend>
            <label for="prodi">Program Studi:</label><br>
            <select id="prodi" name="prodi">
                <option value="">-- Pilih Jurusan --</option>
                <option value="S1 TI">S1 Teknik Informatika</option>
                <option value="D3 MI">D3 Manajemen Informatika</option>
                <option value="S1 DKV">S1 Desain Komunikasi Visual</option>
            </select><br><br>

            <label>Asal Sekolah:</label><br>
            <input type="checkbox" id="sma" name="asal_sekolah" value="SMA">
            <label for="sma">SMA</label>
            <input type="checkbox" id="smk" name="asal_sekolah" value="SMK">
            <label for="smk">SMK</label>
            <input type="checkbox" id="ma" name="asal_sekolah" value="MA">
            <label for="ma">MA</label><br><br>

            <label for="foto">Upload Foto:</label><br>
            <input type="file" id="foto" name="foto" accept="image/*"><br><br>
            <label for="catatan">Catatan Tambahan:</label><br>
            <textarea id="catatan" name="catatan" rows="4" cols="30" placeholder="Tambahkan catatan di sini..."></textarea>
        </fieldset><br>

        <input type="submit" value="Daftar Sekarang">
        <input type="reset" value="Reset Form">
</body>
</html>
