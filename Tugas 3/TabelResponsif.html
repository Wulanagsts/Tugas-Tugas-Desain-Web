<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabel Responsif</title>
    <style>
        body {
            padding: 20px;
            background-color: whit;
        }
        .table-wrapper {
            overflow-x: auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px; 
        }
        caption {
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            color: black;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #00a86b;
            color: white;
            text-transform: uppercase;
            font-size: 14px;
        }
        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        @media screen and (max-width: 600px) {
            table { min-width: 100%; }
            thead { display: none; } 
            tr {
                display: block;
                margin-bottom: 20px;
                border: 2px solid #00a86b;
                border-radius: 5px;
            }
            td {
                display: block;
                text-align: right;
                padding-left: 50%;
                position: relative;
            }
            td::before {
                content: attr(data-label);
                position: absolute;
                left: 10px;
                width: 45%;
                font-weight: bold;
                text-align: left;
                color: #00a86b;
            }
        }
    </style>
</head>
<body>
    <div class="table-wrapper">
        <table>
            <caption>Data Mahasiswa</caption>
            <thead>
                <tr>
                    <th>No</th>
                    <th>Nama</th>
                    <th>Program Studi</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td data-label="No">1</td>
                    <td data-label="Nama">Sony Panca</td>
                    <td data-label="Program Studi">Teknik Informatika</td>
                    <td data-label="Status">Aktif</td>
                </tr>
                <tr>
                    <td data-label="No">2</td>
                    <td data-label="Nama">Budiarto</td>
                    <td data-label="Program Studi">Sistem Informasi</td>
                    <td data-label="Status">Lulus</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
