<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan Semester 2</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: whitesmoke; display: flex; justify-content: center; padding: 20px; }
        section { width: 400px; background: white; border: 1px solid #ccc; display: flex; flex-direction: column; }

        header { 
            height: 180px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: white; text-align: center; background-size: cover; background-position: center;
            background-image: url('https://i.pinimg.com/originals/e7/87/aa/e787aa509e071bccbe334d1693ad0d48.png?text=Mobile');
        }
        @media (min-width: 768px) { header { background-image: url('https://via.placeholder.com/800x250?text=Desktop'); } }

        main { height: 300px; overflow-y: auto; padding: 10px; border-bottom: 1px solid #ccc; }
        article { border-bottom: 1px solid #eee; padding: 10px 0; }
        article h4 { margin: 0; color: navy; }

        footer { padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        input, button { padding: 8px; border: 1px solid #ccc; }
        button { background: navy; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <section>
        <header>
            <h2>My Notes</h2>
            <small>UDP Receiver Active</small>
        </header>

        <main id="box"></main>

        <footer>
            <input type="text" id="j" placeholder="Judul...">
            <input type="text" id="i" placeholder="Isi...">
            <button onclick="add()">Simpan</button>
        </footer>
    </section>

    <script>
        function add() {
            var j = document.getElementById('j'), i = document.getElementById('i'), b = document.getElementById('box');
            if(j.value && i.value) {
                var a = document.createElement('article');
                a.innerHTML = "<h4>"+j.value+"</h4><p>"+i.value+"</p>";
                b.appendChild(a);
                j.value = ""; i.value = ""; b.scrollTop = b.scrollHeight;
            }
        }
    </script>
</body>
</html>
